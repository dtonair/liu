name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: liu
          POSTGRES_PASSWORD: liu
          POSTGRES_DB: liu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U liu -d liu"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go vet ./...
      - run: go build ./...
      - name: Test (incl. Postgres-backed contract)
        env:
          LIU_TEST_DATABASE_URL: postgres://liu:liu@localhost:5432/liu?sslmode=disable
        run: go test -race ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
