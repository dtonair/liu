services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: liu
      POSTGRES_PASSWORD: liu
      POSTGRES_DB: liu
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liu -d liu"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    environment:
      LIU_DATABASE_URL: postgres://liu:liu@postgres:5432/liu?sslmode=disable
      LIU_HTTP_ADDR: ":8080"
      LIU_AUTH_DISABLED: "true"
      LIU_MIGRATE_ON_BOOT: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      LIU_ENGINE_URL: http://engine:8080
      LIU_TENANT_ID: demo
      LIU_ACTIVITY_TYPES: reserve_inventory,capture_payment,release_inventory
    depends_on:
      - engine

volumes:
  pgdata:
